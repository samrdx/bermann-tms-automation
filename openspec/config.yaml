# openspec/config.yaml
schema: spec-driven

artifact_store:
  mode: hybrid
  engram:
    project: bermann-tms-automation
    base_url_env: ENGRAM_BASE_URL
    api_key_env: ENGRAM_API_KEY
    health_path: /health
    topic_key_pattern: sdd/{change-name}/{artifact}
  openspec:
    root: openspec/
    archive_root: openspec/changes/archive/

context: |
  Tech stack: TypeScript ^5.9.3, Playwright ^1.58.0, Node.js 20, Winston ^3.19.0
  Architecture: Page Object Model (POM), Domain-Driven Modules, Skills System
  Testing: Playwright (Chromium + Firefox), 13 tests across 6 modules
  Style: TypeScript strict mode, ES Modules, .js extensions on imports
  CI/CD: GitHub Actions (hybrid workflow: atomic + legacy suites)
  Environments: QA (moveontruckqa.bermanntms.cl), Demo (demo.bermanntms.cl)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack (tms-selectors, tms-dropdowns, tms-page-objects, tms-tests, tms-data)
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

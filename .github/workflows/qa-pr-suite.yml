name: QA PR SUITE

on:
  pull_request:

permissions:
  contents: read

jobs:
  qa-pr-suite:
    name: QA PR SUITE
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Diagnostics - Runtime and browser versions
        run: |
          node --version
          npm --version
          npx playwright --version
          google-chrome --version || true

      - name: Verify Chrome runtime
        timeout-minutes: 2
        run: |
          google-chrome --version
          google-chrome --headless --disable-gpu --no-sandbox --dump-dom about:blank >/dev/null

      - name: TypeScript check
        run: npm run typecheck

      - name: Run E2E Finanzas Full (QA)
        env:
          TMS_USERNAME: ${{ secrets.TMS_USERNAME || 'srodriguez' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASSWORD || 'srodriguez' }}
          CI: true
          ENV: QA
          PLAYWRIGHT_VIDEO: 'off'
        run: npm run qa:e2e:finanzas-full -- --project chromium-qa --workers 1

      - name: Upload PR Playwright/Allure evidences
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: qa-pr-evidences-${{ github.run_id }}
          path: |
            allure-results-qa/
            test-results-qa/
            playwright-report-qa/
            logs/
          retention-days: 7

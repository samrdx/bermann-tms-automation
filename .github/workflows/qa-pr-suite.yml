name: QA PR SUITE

on:
  pull_request:

permissions:
  contents: read

jobs:
  qa-pr-suite:
    name: QA PR SUITE
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome

      - name: TypeScript check
        run: npm run typecheck

      - name: Run E2E Finanzas Full (QA)
        env:
          TMS_USERNAME: ${{ secrets.TMS_USERNAME || 'srodriguez' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASSWORD || 'srodriguez' }}
          CI: true
          ENV: QA
        run: npm run qa:e2e:finanzas-full -- --project chromium-qa --workers 1

      - name: Upload PR Playwright/Allure evidences
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-pr-evidences-${{ github.run_id }}
          path: |
            allure-results-qa/
            test-results-qa/
            playwright-report-qa/
            logs/
          retention-days: 7

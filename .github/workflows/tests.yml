name: QA Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Aumentado para ejecución secuencial

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Staged Execution)
        env:
          BASE_URL_DEV: https://moveontruckqa.bermanntms.cl
          ENVIRONMENT: dev
          HEADLESS: true
          TIMEOUT: 60000
          LOG_LEVEL: info
          TEST_REGULAR_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TEST_REGULAR_PASS: ${{ secrets.TMS_PASS || 'arivas' }}
          USERNAME_DEV: ${{ secrets.TMS_USER || 'arivas' }}
          PASSWORD_DEV: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          # 1. SETUP: Crear Entidades Base (Conductor, Camión, Cliente)
          echo "🚀 STAGE 1: Base Entities"
          npx playwright test tests/e2e/modules/01-entidades --project=chromium --workers=1 --reporter=line

          # 2. CONTRATOS: Crear Contratos usando las entidades de Stage 1
          echo "🚀 STAGE 2: Contracts"
          npx playwright test tests/e2e/modules/02-operaciones/contratos --project=chromium --workers=1 --reporter=line

          # 3. OPERACIONES: Planificar y Asignar usando contratos de Stage 2
          echo "🚀 STAGE 3: Viajes Operations"
          npx playwright test tests/e2e/modules/02-operaciones/viajes --project=chromium --workers=1 --reporter=html,line

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-qa
          path: playwright-report/
          retention-days: 30

      - name: Upload Data Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-data
          path: last-run-data-*.json

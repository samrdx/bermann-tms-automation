name: TMS QA Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - DEMO

jobs:
  # ------------------------------------------------------------------
  # JOB 1: FAST SMOKE (AUTH)
  # ------------------------------------------------------------------
  smoke-auth:
    name: ⚡ Fast Smoke (Auth)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🔑 Run Auth Smoke Tests
        env:
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
          ENV: ${{ github.event.inputs.environment || 'QA' }}
        run: npm run test:auth

      - name: Upload Auth Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-smoke-auth
          path: playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # JOB 2: ATOMIC CORE FLOWS — QA + DEMO (con reporte ZIP descargable)
  # Solo corre si Smoke-Auth pasa
  # ------------------------------------------------------------------
  atomic-core-flows:
    name: 🛡️ Atomic Core Flows (QA + DEMO)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [smoke-auth]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # --- QA E2E Atomic ---
      - name: ⚡ QA – E2E Atómico (prefactura-crear-e2e)
        env:
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
        continue-on-error: true
        run: npm run test:qa:e2e:ci

      # --- DEMO E2E Atomic ---
      - name: ⚡ DEMO – E2E Atómico (prefactura-crear-e2e)
        env:
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
        continue-on-error: true
        run: npm run test:demo:e2e:ci

      # --- Generar reportes Allure estáticos ---
      - name: 📦 Install Allure Commandline
        if: always()
        run: npm install -g allure-commandline

      - name: 🔨 Generate Allure Report – QA
        if: always()
        run: allure generate allure-results-qa -o allure-report-qa --clean || true

      - name: 🔨 Generate Allure Report – DEMO
        if: always()
        run: allure generate allure-results-demo -o allure-report-demo --clean || true

      # --- Subir ZIP descargable ---
      - name: ☁️ Upload Allure Reports (ZIP descargable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-reports-${{ github.sha }}
          path: |
            allure-report-qa/
            allure-report-demo/
          retention-days: 7

name: TMS QA Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - DEMO

jobs:
  # ------------------------------------------------------------------
  # JOB 1: FAST SMOKE (AUTH)
  # ------------------------------------------------------------------
  smoke-auth:
    name: ⚡ Fast Smoke (Auth)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🔑 Run Login/Logout Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
          HEADLESS: true
          TIMEOUT: 30000
          ENV: ${{ github.event.inputs.environment || 'QA' }}
        run: |
          echo "Running Auth Smoke Tests..."
          npm run test:auth

      - name: Upload Auth Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-smoke-auth
          path: playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # JOB 2: TESTS ATÓMICOS CORE (Solo corre si Smoke-Auth pasa)
  # ------------------------------------------------------------------
  atomic-core-flows:
    name: 🛡️ Atomic Core Flows
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [smoke-auth]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run Atomic Business Workflows
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
          HEADLESS: true
          LOG_LEVEL: info
          TIMEOUT: 60000
          ENV: ${{ github.event.inputs.environment || 'QA' }}

        # Se agrupan los scripts que dependen solo de su entorno interno API (atomic)
        # o los flujos combinados que no asfixian los workers.
        run: |
          echo "Running Independent Core Business Flows..."
          npm run test:qa:trip:full-flow

      - name: 📦 Install Allure Commandline
        if: always()
        run: npm install -g allure-commandline

      - name: 🔨 Generate Allure Report (No History)
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: ☁️ Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report-qa
          path: allure-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # NOTA A FUTURO PARA REFACTOR DE PIPELINES:
  # El entorno Legacy-Suite (30 min secuencial) se ha removido intencionalmente
  # de este flujo On-Push/PR debido a cuellos de botella de tiempo.
  # Se sugiere crear un archivo cron .github/workflows/nightly.yml
  # que apunte a `npm run test:legacy:fullviajes:all` para salud completa.
  # ------------------------------------------------------------------

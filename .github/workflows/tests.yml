name: TMS QA Suite (Hybrid)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Definimos URL base global
  BASE_URL: https://moveontruckqa.bermanntms.cl
  CI: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: TESTS ATÓMICOS (NUEVA GENERACIÓN)
  # Son independientes, crean sus propios datos y pueden correr en paralelo.
  # ------------------------------------------------------------------
  atomic-suite:
    name: 🛡️ Atomic E2E Flows
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run Atomic Workflows
        env:
          # Inyectamos secretos por si el TmsApiClient evoluciona
          TMS_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASS: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          echo "Running Independent Business Flows..."
          # Ejecutamos específicamente tu nuevo test
          npx playwright test tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts \
            --project=chromium \
            --reporter=html,line

      - name: Upload Atomic Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-atomic
          path: playwright-report/
          retention-days: 15

  # ------------------------------------------------------------------
  # JOB 2: TESTS LEGACY (DEPENDIENTES DE SETUP)
  # Requieren orden secuencial y compartir el archivo JSON.
  # ------------------------------------------------------------------
  legacy-suite:
    name: 📦 Legacy Dependent Flows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [] # No depende de atomic-suite, corren a la vez

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: ⛓️ Run Sequential Legacy Suite
        env:
          BASE_URL_DEV: ${{ env.BASE_URL }}
          TEST_REGULAR_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TEST_REGULAR_PASS: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          # 1. SETUP BASE (Genera el JSON)
          echo "🔹 Stage 1: Base Setup"
          npx playwright test --project=base-entities-chromium --reporter=line

          # 2. CONTRATOS (Usa el JSON)
          echo "🔹 Stage 2: Legacy Contracts"
          npx playwright test tests/e2e/modules/02-operaciones/contratos --project=chromium --workers=1 --reporter=line

          # 3. VIAJES PLANIFICAR (Usa el JSON - Solo Planificar, Asignar ya está en Atomic)
          echo "🔹 Stage 3: Legacy Planning"
          npx playwright test tests/e2e/modules/02-operaciones/viajes/viajes-planificar.test.ts --project=chromium --workers=1 --reporter=line

      - name: Upload Legacy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-legacy
          path: playwright-report/
          retention-days: 15

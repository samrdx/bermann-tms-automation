name: PR E2E DEMO

on:
  pull_request:

permissions:
  contents: read

jobs:
  e2e-finanzas-full-demo:
    name: E2E Finanzas Full (DEMO)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Finanzas Full (DEMO)
        env:
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
          ENV: DEMO
        run: npm run demo:e2e:finanzas-full -- --project chromium-demo --workers 1

  ultimamilla-batch-demo:
    name: Ultima Milla Batch (DEMO)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: ultimamilla-batch-${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          ENV_UPPER="DEMO"
          ENV_LOWER="demo"
          PROJECT_ONE="chromium-demo"
          PROJECT_TWO="firefox-demo"
          SEED_CMD="npm run demo:seed:legacy"
          BATCH_SIZE="8"

          echo "env_upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"
          echo "env_lower=$ENV_LOWER" >> "$GITHUB_OUTPUT"
          echo "project_one=$PROJECT_ONE" >> "$GITHUB_OUTPUT"
          echo "project_two=$PROJECT_TWO" >> "$GITHUB_OUTPUT"
          echo "seed_cmd=$SEED_CMD" >> "$GITHUB_OUTPUT"
          echo "batch_size=$BATCH_SIZE" >> "$GITHUB_OUTPUT"
          echo "report_dir=allure-report-$ENV_LOWER" >> "$GITHUB_OUTPUT"
          echo "results_dir=allure-results-$ENV_LOWER" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Seed legacy data (${{ steps.meta.outputs.env_upper }})
        env:
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          CI: true
        run: ${{ steps.meta.outputs.seed_cmd }}

      - name: Run Ultima Milla batch test (multi-browser serial)
        env:
          ENV: ${{ steps.meta.outputs.env_upper }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          ULTIMAMILLA_ENABLE_MUTATION: 'true'
          ULTIMAMILLA_BATCH_SIZE: ${{ steps.meta.outputs.batch_size }}
          CI: true
        run: |
          npx playwright test tests/e2e/modules/ultimamilla/pedido-asignar-batch.test.ts \
            --project ${{ steps.meta.outputs.project_one }} \
            --project ${{ steps.meta.outputs.project_two }} \
            --workers 1 --trace retain-on-failure

      - name: Prune oversized Allure attachments
        if: always()
        shell: bash
        run: |
          RESULTS_DIR="${{ steps.meta.outputs.results_dir }}"
          if [[ -d "$RESULTS_DIR" ]]; then
            echo "Pruning oversized attachments in $RESULTS_DIR"
            echo "Removing heavy binary attachments (.zip/.webm/.mp4)"
            find "$RESULTS_DIR" -type f \( -name '*.zip' -o -name '*.webm' -o -name '*.mp4' \) -print -delete || true

            echo "Removing any remaining oversized files >20MB"
            find "$RESULTS_DIR" -type f -size +20M -print -delete || true

            echo "Largest remaining files in results dir:"
            find "$RESULTS_DIR" -type f -printf '%s %p\n' | sort -nr | head -n 20 || true
          fi

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          RESULTS_DIR="${{ steps.meta.outputs.results_dir }}"
          REPORT_DIR="${{ steps.meta.outputs.report_dir }}"
          if [[ ! -d "$RESULTS_DIR" ]] || [[ -z "$(ls -A "$RESULTS_DIR" 2>/dev/null)" ]]; then
            echo "Missing or empty Allure results directory: $RESULTS_DIR"
            exit 1
          fi
          allure generate "$RESULTS_DIR" -o "$REPORT_DIR" --clean

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-ultimamilla-batch-${{ steps.meta.outputs.env_lower }}-${{ github.run_id }}
          path: ${{ steps.meta.outputs.report_dir }}/
          if-no-files-found: error
          retention-days: 14

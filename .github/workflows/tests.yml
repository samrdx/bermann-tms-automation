name: TMS QA Suite (Hybrid)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------
  # JOB 1: TESTS ATÓMICOS (NUEVA GENERACIÓN - STANDARD)
  # ------------------------------------------------------------------
  atomic-suite:
    name: 🛡️ Atomic E2E Flows
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run Atomic Workflows
        env:
          # --- ESTÁNDAR CONSOLIDADO ---
          BASE_URL: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}

          # Variables de Configuración Playwright
          CI: true
          HEADLESS: true
          LOG_LEVEL: info
          TIMEOUT: 60000

          # Compatibilidad Legacy
          BASE_URL_DEV: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          TMS_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASS: ${{ secrets.TMS_PASS || 'arivas' }}

        # CORRECCIÓN IMPORTANTE: Ejecutar múltiples archivos en UN solo comando
        # Esto genera un único reporte HTML combinado y permite paralelismo real.
        run: |
          echo "Running Independent Business Flows..."
          npx playwright test \
            tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts \
            tests/e2e/modules/02-operaciones/Monitoreo/viajes-finalizar.test.ts \
            --project=chromium \
            --reporter=html,line

      - name: Upload Atomic Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-atomic
          path: playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # JOB 2: TESTS LEGACY (Sin cambios, para no romper compatibilidad)
  # ------------------------------------------------------------------
  legacy-suite:
    name: 📦 Legacy Dependent Flows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: ⛓️ Run Sequential Legacy Suite
        env:
          # Variables Legacy (Mantener hasta refactorizar estos tests)
          BASE_URL: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          BASE_URL_DEV: ${{ secrets.BASE_URL || 'https://moveontruckqa.bermanntms.cl' }}
          ENVIRONMENT: dev
          HEADLESS: true
          TIMEOUT: 60000
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          TEST_REGULAR_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TEST_REGULAR_PASS: ${{ secrets.TMS_PASS || 'arivas' }}
          USERNAME_DEV: ${{ secrets.TMS_USER || 'arivas' }}
          PASSWORD_DEV: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          echo "🔹 Stage 1: Base Setup"
          npx playwright test --project=base-entities-chromium --reporter=line

          echo "🔹 Stage 2: Legacy Contracts"
          npx playwright test tests/e2e/modules/02-operaciones/contratos --project=chromium --workers=1 --reporter=line

          echo "🔹 Stage 3: Legacy Planning"
          npx playwright test tests/e2e/modules/02-operaciones/viajes/viajes-planificar.test.ts --project=chromium --workers=1 --reporter=line

      - name: Upload Legacy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-legacy
          path: playwright-report/
          retention-days: 7

name: Config Setup Manual (Sprint Bootstrap)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "QA"
        type: choice
        options:
          - QA
          - DEMO
      run_phase1:
        description: "Run phase 1 (unidad negocio, tipo operacion, tipo servicio, capacidad, ruta)"
        required: true
        default: true
        type: boolean
      run_phase2:
        description: "Run phase 2 (carga setup + carga final)"
        required: true
        default: true
        type: boolean

jobs:
  setup:
    name: Config Setup (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve metadata
        id: setup_meta
        shell: bash
        run: |
          ENV_UPPER="${{ inputs.environment }}"
          ENV_LOWER=$(echo "$ENV_UPPER" | tr '[:upper:]' '[:lower:]')
          echo "env_upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"
          echo "env_lower=$ENV_LOWER" >> "$GITHUB_OUTPUT"

      - name: Cleanup setup data files
        shell: bash
        run: |
          ENV_LOWER="${{ steps.setup_meta.outputs.env_lower }}"
          RUN_PHASE1="${{ inputs.run_phase1 }}"

          # Only reset phase-1 output when phase 1 is requested.
          if [[ "$RUN_PHASE1" == "true" ]]; then
            rm -f "playwright/.data/setup-config-data-chromium-${ENV_LOWER}.json"
            rm -f "playwright/.data/setup-config-data-firefox-${ENV_LOWER}.json"
          fi

          # Phase-2 artifacts can always be recreated safely.
          rm -f "playwright/.data/carga_setup_data-chromium-${ENV_LOWER}.json"
          rm -f "playwright/.data/carga_setup_data-firefox-${ENV_LOWER}.json"
          rm -f "playwright/.data/carga_setup_data.json"

      - name: Run setup phase 1
        if: ${{ inputs.run_phase1 }}
        env:
          ENV: ${{ steps.setup_meta.outputs.env_upper }}
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test tests/e2e/suites/01-config-master.setup.ts --workers=1 --trace on

      - name: Run setup phase 2
        if: ${{ inputs.run_phase2 }}
        env:
          ENV: ${{ steps.setup_meta.outputs.env_upper }}
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test tests/e2e/suites/02-carga-master.setup.ts --workers=1 --trace on

      - name: Upload setup data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-data-${{ steps.setup_meta.outputs.env_lower }}-${{ github.run_id }}
          path: |
            playwright/.data/setup-config-data-*-${{ steps.setup_meta.outputs.env_lower }}.json
            playwright/.data/carga_setup_data*${{ steps.setup_meta.outputs.env_lower }}.json
            playwright/.data/carga_setup_data.json
          if-no-files-found: warn
          retention-days: 14

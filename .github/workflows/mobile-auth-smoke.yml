name: Mobile Auth Smoke (Phase 1)

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'
  pull_request:
    branches: [main]
    paths:
      - 'tmsapp/mobile/**'
      - '.github/workflows/mobile-auth-smoke.yml'

jobs:
  mobile-auth-smoke:
    name: Mobile Native Auth Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 50
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    concurrency:
      group: mobile-auth-smoke-${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: true
    permissions:
      contents: read

    defaults:
      run:
        working-directory: tmsapp/mobile

    env:
      MOBILE_SMOKE_TOTAL_TESTS: '1'
      MOBILE_SMOKE_GATE_WINDOW_RUNS: '20'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tmsapp/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare run directories
        run: |
          mkdir -p artifacts/logs
          mkdir -p artifacts/ci/run-summaries

      - name: Run mobile auth smoke on emulator
        id: mobile_smoke
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        env:
          TMS_USERNAME: ${{ secrets.TMS_USERNAME }}
          TMS_PASSWORD: ${{ secrets.TMS_PASSWORD }}
          TMS_COMPANY: ${{ secrets.TMS_COMPANY }}
          MOBILE_DIAGNOSTICS_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          MOBILE_DEVICE_NAME: ci-pixel-6
          MOBILE_PLATFORM_VERSION: '13'
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            set -o pipefail
            mkdir -p artifacts/logs artifacts/ci/run-summaries

            RUN_TOKEN="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            LOG_PATH="artifacts/logs/mobile-auth-smoke-${RUN_TOKEN}.log"
            SUMMARY_PATH="artifacts/ci/run-summaries/mobile-auth-smoke-${RUN_TOKEN}.json"

            npx appium driver install uiautomator2 || true

            set +e
            npm run wdio 2>&1 | tee "$LOG_PATH"
            SMOKE_EXIT=${PIPESTATUS[0]}
            set -e

            if [[ $SMOKE_EXIT -eq 0 ]]; then
              SMOKE_OUTCOME="success"
              SMOKE_PASSED=1
              SMOKE_FAILED=0
            else
              SMOKE_OUTCOME="failed"
              SMOKE_PASSED=0
              SMOKE_FAILED=1
            fi

            cat > "$SUMMARY_PATH" <<EOF
            {
              "runId": "${GITHUB_RUN_ID}",
              "runAttempt": ${GITHUB_RUN_ATTEMPT},
              "eventName": "${GITHUB_EVENT_NAME}",
              "ref": "${GITHUB_REF}",
              "sha": "${GITHUB_SHA}",
              "workflow": "${GITHUB_WORKFLOW}",
              "recordedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "outcome": "${SMOKE_OUTCOME}",
              "totals": {
                "tests": ${MOBILE_SMOKE_TOTAL_TESTS},
                "passed": ${SMOKE_PASSED},
                "failed": ${SMOKE_FAILED}
              },
              "stabilityProfile": {
                "maxInstances": 1,
                "apiLevel": 33,
                "deviceProfile": "pixel_6"
              },
              "logPath": "${LOG_PATH}"
            }
            EOF

            exit $SMOKE_EXIT

      - name: Parse smoke metrics
        if: always()
        run: |
          npx --yes tsx ./scripts/smoke-metrics.ts \
            --history-dir ./artifacts/ci/run-summaries \
            --diagnostics-dir ./artifacts/diagnostics \
            --logs-dir ./artifacts/logs \
            --window-runs ${MOBILE_SMOKE_GATE_WINDOW_RUNS} \
            --output-json ./artifacts/ci/smoke-metrics.json \
            --output-md ./artifacts/ci/smoke-metrics.md

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-auth-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tmsapp/mobile/artifacts/ci/run-summaries/
            tmsapp/mobile/artifacts/ci/smoke-metrics.json
            tmsapp/mobile/artifacts/ci/smoke-metrics.md
            tmsapp/mobile/artifacts/logs/
            tmsapp/mobile/artifacts/diagnostics/
          if-no-files-found: warn
          retention-days: 21

      - name: Phase 1 gate policy
        if: always()
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR mode is non-blocking by design (Phase 1)."
            echo "See tmsapp/mobile/docs/mobile-ci-gates.md for promotion criteria."
            exit 0
          fi

          if [[ "${{ steps.mobile_smoke.outcome }}" != "success" ]]; then
            echo "Nightly/manual mobile smoke failed with outcome: ${{ steps.mobile_smoke.outcome }}"
            exit 1
          fi

name: 🌙 TMS QA + DEMO Nightly (Allure)

on:
  schedule:
    # Corre a las 3 AM UTC todos los días
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      # ==========================================
      # 1. QA TESTS — Legacy Flow + E2E Atómico
      # ==========================================
      - name: 🏃 QA – Legacy Flow (entidades → contratos → viajes → prefactura)
        env:
          ENV: QA
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        continue-on-error: true
        run: |
          npm run clean:allure:qa
          npm run test:qa:flow:entidades-to-prefactura

      - name: ⚡ QA – E2E Atómico (prefactura-crear-e2e, Chromium + Firefox)
        env:
          ENV: QA
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        continue-on-error: true
        run: npm run test:qa:e2e:ci

      # ==========================================
      # 2. DEMO TESTS — Legacy Flow + E2E Atómico
      # ==========================================
      - name: 🏃 DEMO – Legacy Flow (entidades → contratos → viajes → prefactura)
        env:
          ENV: DEMO
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        continue-on-error: true
        run: |
          npm run clean:allure:demo
          npm run test:demo:flow:entidades-to-prefactura

      - name: ⚡ DEMO – E2E Atómico (prefactura-crear-e2e, Chromium + Firefox)
        env:
          ENV: DEMO
          CI: true
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        continue-on-error: true
        run: npm run test:demo:e2e:ci

      # ==========================================
      # 3. MERGE RESULTS + ALLURE → GITHUB PAGES
      # ==========================================
      - name: 📂 Merge Allure Results (QA + DEMO)
        if: always()
        run: |
          mkdir -p allure-results
          cp -r allure-results-qa/* allure-results/ || true
          cp -r allure-results-demo/* allure-results/ || true

      - name: 📈 Get Allure history (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: 🔨 Generate Allure Report con historial
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: 🚀 Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

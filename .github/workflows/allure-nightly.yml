name: TMS QA + DEMO Nightly (Allure)

on:
  schedule:
    # Runs daily at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      # ==========================================
      # 1. QA TESTS - Heavy grouped regressions
      # ==========================================
      - name: QA - Grouped Regressions (ops + finanzas + ultima milla)
        id: qa_legacy_flow
        env:
          ENV: QA
          CI: true
          LEGACY_DATA_SOURCE: entities
          LEGACY_RUN_ID: nightly-qa-${{ github.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          SKIP_CLEAN: true
        continue-on-error: true
        run: |
          rm -f "playwright/.data/legacy-entities-data-chromium-qa-${LEGACY_RUN_ID}.json"
          rm -f "playwright/.data/legacy-entities-data-firefox-qa-${LEGACY_RUN_ID}.json"

          npm run clean:reports
          npm run qa:regression:ops
          npm run qa:regression:finanzas
          npm run qa:regression:ultimamilla

      # ==========================================
      # 2. DEMO TESTS - Heavy grouped regressions
      # ==========================================
      - name: DEMO - Grouped Regressions (ops + finanzas + ultima milla)
        id: demo_legacy_flow
        env:
          ENV: DEMO
          CI: true
          LEGACY_DATA_SOURCE: entities
          LEGACY_RUN_ID: nightly-demo-${{ github.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
          SKIP_CLEAN: true
        continue-on-error: true
        run: |
          rm -f "playwright/.data/legacy-entities-data-chromium-demo-${LEGACY_RUN_ID}.json"
          rm -f "playwright/.data/legacy-entities-data-firefox-demo-${LEGACY_RUN_ID}.json"

          npm run demo:regression:ops
          npm run demo:regression:finanzas
          npm run demo:regression:ultimamilla

      # ==========================================
      # 3. MERGE RESULTS + ALLURE -> GITHUB PAGES
      # ==========================================
      - name: Merge Allure Results (QA + DEMO)
        id: merge_allure_results
        if: always()
        shell: bash
        run: |
          mkdir -p allure-results

          QA_PRESENT=false
          DEMO_PRESENT=false

          if [[ -d "allure-results-qa" ]] && [[ -n "$(ls -A allure-results-qa 2>/dev/null)" ]]; then
            cp -r allure-results-qa/* allure-results/
            QA_PRESENT=true
            echo "Merged QA results from allure-results-qa"
          else
            echo "::warning::Missing or empty directory: allure-results-qa"
          fi

          if [[ -d "allure-results-demo" ]] && [[ -n "$(ls -A allure-results-demo 2>/dev/null)" ]]; then
            cp -r allure-results-demo/* allure-results/
            DEMO_PRESENT=true
            echo "Merged DEMO results from allure-results-demo"
          else
            echo "::warning::Missing or empty directory: allure-results-demo"
          fi

          echo "qa_results_present=$QA_PRESENT" >> "$GITHUB_OUTPUT"
          echo "demo_results_present=$DEMO_PRESENT" >> "$GITHUB_OUTPUT"

      - name: Get Allure history (gh-pages)
        id: get_allure_history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report with history
        id: generate_allure_report
        uses: simple-elf/allure-report-action@master
        if: always()
        continue-on-error: true
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        id: deploy_pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Final Nightly Gate
        id: final_nightly_gate
        if: always()
        shell: bash
        run: |
          FAIL=0

          if [[ "${{ steps.qa_legacy_flow.outcome }}" != "success" ]]; then
            echo "QA legacy flow failed with outcome: ${{ steps.qa_legacy_flow.outcome }}"
            FAIL=1
          fi

          if [[ "${{ steps.demo_legacy_flow.outcome }}" != "success" ]]; then
            echo "DEMO legacy flow failed with outcome: ${{ steps.demo_legacy_flow.outcome }}"
            FAIL=1
          fi

          # Missing-artifact policy decision: directory checks warn early; final gate enforces failure.
          if [[ "${{ steps.merge_allure_results.outputs.qa_results_present }}" != "true" ]]; then
            echo "Mandatory QA Allure results are missing."
            FAIL=1
          fi

          if [[ "${{ steps.merge_allure_results.outputs.demo_results_present }}" != "true" ]]; then
            echo "Mandatory DEMO Allure results are missing."
            FAIL=1
          fi

          if [[ "${{ steps.generate_allure_report.outcome }}" != "success" ]]; then
            echo "Allure report generation failed with outcome: ${{ steps.generate_allure_report.outcome }}"
            FAIL=1
          fi

          if [[ "${{ steps.deploy_pages.outcome }}" != "success" ]]; then
            echo "GitHub Pages deploy failed with outcome: ${{ steps.deploy_pages.outcome }}"
            FAIL=1
          fi

          exit $FAIL

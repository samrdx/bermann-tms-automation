name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-jammy 
      options: --ipc=host 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Run Specific Test (Viajes Asignar)
      env:
        # Mapeamos TUS secretos de GitHub a las variables que usa el código
        TMS_USER: ${{ secrets.USERNAME_DEV }}
        TMS_PASS: ${{ secrets.PASSWORD_DEV }}
        
        # Si tienes una URL base en secretos, úsala así (o quítala si está hardcodeada)
        BASE_URL: ${{ secrets.BASE_URL }} 
        
        # Fuerza el modo headless en playwright.config.ts
        CI: 1 
      
      # Ejecuta solo el test blindado
      run: npx playwright test tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts --project=chromium

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
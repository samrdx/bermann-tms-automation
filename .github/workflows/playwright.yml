name: TMS AUTOMATION E2E TEST

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy 
      options: --ipc=host 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Run Specific Test (Viajes Asignar)
      # 1. Aquí definimos las variables de entorno para ESTE paso
      env:
        # Mapeamos los Secretos de GitHub a las variables que usa tu código
        BASE_URL: ${{ secrets.BASE_URL }}
        TMS_USERNAME: ${{ secrets.TMS_USER }}
        TMS_PASSWORD: ${{ secrets.TMS_PASS }}
        
        # Compatibilidad Legacy
        TMS_USER: ${{ secrets.TMS_USER }}
        TMS_PASS: ${{ secrets.TMS_PASS }}
        
        # Activamos modo CI (Headless)
        CI: 1
      
      # 2. Aquí ejecutamos los comandos (Debug + Test)
      run: |
        echo "🔍 Verificando inyección de variables..."
        
        if [ -z "$BASE_URL" ]; then 
          echo "❌ ERROR CRÍTICO: La variable BASE_URL está vacía. Revisa los 'Repository Secrets' en GitHub."
          exit 1
        else 
          echo "✅ BASE_URL detectada correctamente."
        fi
        
        echo "🚀 Iniciando ejecución de Playwright..."
        npx playwright test tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts --project=chromium

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
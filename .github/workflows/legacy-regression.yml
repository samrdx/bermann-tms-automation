name: Legacy Regression (Entities + Base)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "QA"
        type: choice
        options:
          - QA
          - DEMO
      run_entities:
        description: "Run entities-seeded legacy regression"
        required: true
        default: true
        type: boolean
      run_base:
        description: "Run base-seeded legacy regression"
        required: true
        default: true
        type: boolean

jobs:
  legacy-entities:
    name: Legacy Regression (Entities Seed)
    if: ${{ inputs.run_entities }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve metadata
        id: entities_meta
        shell: bash
        run: |
          ENV_UPPER="${{ inputs.environment }}"
          ENV_LOWER=$(echo "$ENV_UPPER" | tr '[:upper:]' '[:lower:]')
          RUN_ID="legacy-entities-${GITHUB_RUN_ID}"
          echo "env_upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"
          echo "env_lower=$ENV_LOWER" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Cleanup target data file (entities seed)
        shell: bash
        run: |
          ENV_LOWER="${{ steps.entities_meta.outputs.env_lower }}"
          RUN_ID="${{ steps.entities_meta.outputs.run_id }}"
          rm -f "playwright/.data/legacy-entities-data-chromium-${ENV_LOWER}-${RUN_ID}.json"
          rm -f "playwright/.data/legacy-entities-data-firefox-${ENV_LOWER}-${RUN_ID}.json"

      - name: Seed entities (transportista + cliente)
        env:
          ENV: ${{ steps.entities_meta.outputs.env_upper }}
          CI: true
          LEGACY_DATA_SOURCE: entities
          LEGACY_RUN_ID: ${{ steps.entities_meta.outputs.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test \
            tests/e2e/modules/01-entidades/transport/transportistas-crear.test.ts \
            tests/e2e/modules/01-entidades/clientes/cliente-crear.test.ts \
            --workers=1 --trace on

      - name: Run dependent legacy flow (entities source)
        env:
          ENV: ${{ steps.entities_meta.outputs.env_upper }}
          CI: true
          LEGACY_DATA_SOURCE: entities
          LEGACY_RUN_ID: ${{ steps.entities_meta.outputs.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test \
            tests/e2e/modules/01-entidades/conductor/conductor-crear.test.ts \
            tests/e2e/modules/01-entidades/vehiculos/vehiculo-crear.test.ts \
            tests/e2e/modules/02-operaciones/contratos/contrato-crear.test.ts \
            tests/e2e/modules/02-operaciones/contratos/contrato2cliente-crear.test.ts \
            tests/e2e/modules/02-operaciones/viajes/viajes-planificar.test.ts \
            tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts \
            tests/e2e/modules/02-operaciones/Monitoreo/viajes-monitoreo.test.ts \
            tests/e2e/modules/03-finanzas/prefactura/prefactura-crear.test.ts \
            --workers=1 --trace on

  legacy-base:
    name: Legacy Regression (Base Seed)
    if: ${{ inputs.run_base }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Preflight - Validate workflow script references
        run: npm run ci:validate:workflow-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve metadata
        id: base_meta
        shell: bash
        run: |
          ENV_UPPER="${{ inputs.environment }}"
          ENV_LOWER=$(echo "$ENV_UPPER" | tr '[:upper:]' '[:lower:]')
          RUN_ID="legacy-base-${GITHUB_RUN_ID}"
          echo "env_upper=$ENV_UPPER" >> "$GITHUB_OUTPUT"
          echo "env_lower=$ENV_LOWER" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Cleanup target data file (base seed)
        shell: bash
        run: |
          ENV_LOWER="${{ steps.base_meta.outputs.env_lower }}"
          RUN_ID="${{ steps.base_meta.outputs.run_id }}"
          rm -f "playwright/.data/legacy-base-entities-data-chromium-${ENV_LOWER}-${RUN_ID}.json"
          rm -f "playwright/.data/legacy-base-entities-data-firefox-${ENV_LOWER}-${RUN_ID}.json"

      - name: Seed base entities
        env:
          ENV: ${{ steps.base_meta.outputs.env_upper }}
          CI: true
          LEGACY_DATA_SOURCE: base
          LEGACY_RUN_ID: ${{ steps.base_meta.outputs.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test tests/e2e/suites/base-entities.setup.ts --workers=1 --trace on

      - name: Run dependent legacy flow (base source)
        env:
          ENV: ${{ steps.base_meta.outputs.env_upper }}
          CI: true
          LEGACY_DATA_SOURCE: base
          LEGACY_RUN_ID: ${{ steps.base_meta.outputs.run_id }}
          TMS_USERNAME: ${{ secrets.TMS_USER || 'arivas' }}
          TMS_PASSWORD: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          npx playwright test \
            tests/e2e/modules/02-operaciones/contratos/contrato-crear.test.ts \
            tests/e2e/modules/02-operaciones/contratos/contrato2cliente-crear.test.ts \
            tests/e2e/modules/02-operaciones/viajes/viajes-planificar.test.ts \
            tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts \
            tests/e2e/modules/02-operaciones/Monitoreo/viajes-monitoreo.test.ts \
            tests/e2e/modules/03-finanzas/prefactura/prefactura-crear.test.ts \
            --workers=1 --trace on

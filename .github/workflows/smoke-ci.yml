name: Smoke CI (Recovery Mode)

on:
  push:
    branches: [main, develop, fix/*, debug/*]
  workflow_dispatch:

jobs:
  smoke-setup:
    name: Smoke Setup (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Operational Suite (Sequential)
        env:
          BASE_URL_DEV: https://moveontruckqa.bermanntms.cl
          ENVIRONMENT: dev
          HEADLESS: true
          TIMEOUT: 60000
          LOG_LEVEL: info
          TEST_REGULAR_USER: ${{ secrets.TMS_USER || 'arivas' }}
          TEST_REGULAR_PASS: ${{ secrets.TMS_PASS || 'arivas' }}
          USERNAME_DEV: ${{ secrets.TMS_USER || 'arivas' }}
          PASSWORD_DEV: ${{ secrets.TMS_PASS || 'arivas' }}
        run: |
          echo "🔹 Step 1: Base Entities Setup"
          npx playwright test --project=base-entities-chromium --reporter=line

          echo "🔹 Step 2: Contract Tests (Sequential)"
          npx playwright test \
            tests/e2e/modules/02-operaciones/contratos/contrato-crear.test.ts \
            tests/e2e/modules/02-operaciones/contratos/contrato2cliente-crear.test.ts \
            --project=chromium --workers=1 --reporter=line

          echo "🔹 Step 3: Viajes Tests (Sequential - CRITICAL)"
          # FIX: --workers=1 garantiza que Planificar termine antes de Asignar
          # FIX: --reporter=line,html asegura que se genere el reporte incluso si falla
          npx playwright test \
            tests/e2e/modules/02-operaciones/viajes/viajes-planificar.test.ts \
            tests/e2e/modules/02-operaciones/viajes/viajes-asignar.test.ts \
            --project=chromium --workers=1 --reporter=line,html

      - name: List Generated Files (Debug)
        if: always()
        run: |
          echo "📂 Checking Data Files:"
          ls -la *.json 2>/dev/null || echo "No JSON files found in root"

      - name: Upload Setup Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-run-data-chromium
          path: last-run-data-chromium.json
          if-no-files-found: warn
          retention-days: 5

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 5
